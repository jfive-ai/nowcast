name: Nowcast
options:
  bundleIdPrefix: com.jfive-ai
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.0"
  FeedKit:
    url: https://github.com/nmdias/FeedKit
    from: "9.1.2"
targets:
  Nowcast:
    type: application
    platform: macOS
    sources:
      - path: Nowcast
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Nowcast/Resources
    info:
      path: Nowcast/Resources/Info.plist
      properties:
        CFBundleName: Nowcast
        CFBundleDisplayName: Nowcast
        CFBundleShortVersionString: "0.0.1"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        LSApplicationCategoryType: public.app-category.news
        NSHumanReadableCopyright: ""
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    entitlements:
      path: Nowcast/Resources/Nowcast.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jfive-ai.nowcast
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: GRDB
        product: GRDB
      - package: FeedKit
        product: FeedKit
schemes:
  Nowcast:
    build:
      targets:
        Nowcast: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
